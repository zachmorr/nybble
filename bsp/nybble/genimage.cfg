image boot.vfat {
    vfat {
        files = {
            "linux-nybble.dtb",
            "zImage",
            "boot.scr",
        }
    }
    size = 32M
}

image sdcard.img {
    hdimage {
    }
    partition u-boot {
        partition-type = 0xC
        bootable = "true"
        image = "boot.vfat"
        offset=1M
    }
}